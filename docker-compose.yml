services:
  sensorlens:
    build:
      context: .
      dockerfile: Dockerfile
    image: sensorlens:latest
    platform: linux/arm64

    ports:
      - "8050:8050"

    # To use nuScenes data, uncomment the volumes section below and set NUSCENES_PATH:
    #   export NUSCENES_PATH=/path/to/nuscenes/v1.0-mini
    # volumes:
    #   - ${NUSCENES_PATH}:/data/nuscenes:ro

    stdin_open: true
    tty: true
